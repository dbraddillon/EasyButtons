<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1024px; height: 1024px;
  background: #111111;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.scene {
  position: relative;
  width: 860px;
  height: 860px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Ground shadow */
.ground-shadow {
  position: absolute;
  bottom: 82px;
  left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 70px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.8) 0%, transparent 70%);
  border-radius: 50%;
}

/* Base — oval platform */
.base {
  position: absolute;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  width: 720px;
  height: 140px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 50% 30%,
    #3a3a3a 0%,
    #222222 50%,
    #141414 100%
  );
  box-shadow:
    0 12px 40px rgba(0,0,0,0.9),
    0 4px 12px rgba(0,0,0,0.6),
    inset 0 2px 4px rgba(255,255,255,0.05);
}

/* Rim ring around dome base */
.rim {
  position: absolute;
  bottom: 168px;
  left: 50%;
  transform: translateX(-50%);
  width: 640px; height: 640px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%,
    #4a4a4a 0%,
    #2a2a2a 55%,
    #181818 100%
  );
  box-shadow:
    0 24px 60px rgba(0,0,0,0.95),
    0 8px 20px rgba(0,0,0,0.7);
}

/* Dome */
.dome {
  position: absolute;
  bottom: 196px;
  left: 50%;
  transform: translateX(-50%);
  width: 594px; height: 594px;
  border-radius: 50%;
  background: radial-gradient(circle at 36% 28%,
    #ff8080 0%,
    #f03030 18%,
    #e02020 35%,
    #c01818 58%,
    #8b0000 100%
  );
  box-shadow:
    0 16px 48px rgba(0,0,0,0.6),
    inset 0 -18px 48px rgba(0,0,0,0.35),
    inset 0 3px 8px rgba(255,255,255,0.1);
}

/* Large soft gloss */
.gloss {
  position: absolute;
  top: 6%; left: 12%;
  width: 64%; height: 40%;
  background: radial-gradient(ellipse at 46% 22%,
    rgba(255,255,255,0.46) 0%,
    rgba(255,255,255,0.16) 42%,
    rgba(255,255,255,0) 68%
  );
  border-radius: 50%;
  pointer-events: none;
}

/* Sharp specular */
.specular {
  position: absolute;
  top: 9%; left: 20%;
  width: 26%; height: 15%;
  background: radial-gradient(ellipse,
    rgba(255,255,255,0.72) 0%,
    rgba(255,255,255,0.22) 50%,
    transparent 75%
  );
  border-radius: 50%;
  pointer-events: none;
}

/* Bottom depth shadow */
.dome-shadow {
  position: absolute;
  bottom: 5%; left: 8%;
  width: 84%; height: 30%;
  background: radial-gradient(ellipse,
    rgba(0,0,0,0.28) 0%,
    transparent 70%
  );
  border-radius: 50%;
  pointer-events: none;
}

/* EASY text */
.label {
  position: absolute;
  bottom: 196px;
  left: 50%;
  transform: translateX(-50%);
  width: 594px; height: 594px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.label span {
  display: block;
  margin-top: 40px; /* shift slightly below center */
  font-family: 'Arial Black', 'Impact', sans-serif;
  font-size: 112px;
  font-weight: 900;
  color: rgba(255,255,255,0.92);
  letter-spacing: 8px;
  text-shadow:
    0 3px 12px rgba(0,0,0,0.5),
    0 1px 2px rgba(0,0,0,0.4);
  user-select: none;
}
</style>
</head>
<body>
  <div class="scene">
    <div class="ground-shadow"></div>
    <div class="base"></div>
    <div class="rim"></div>
    <div class="dome">
      <div class="gloss"></div>
      <div class="specular"></div>
      <div class="dome-shadow"></div>
    </div>
    <div class="label"><span>EASY</span></div>
  </div>
</body>
</html>
