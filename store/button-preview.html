<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 900px; height: 560px;
  background: #0f0f0f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  overflow: hidden;
}

.grid {
  display: flex;
  gap: 32px;
  align-items: flex-end;
}

.btn-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Base oval */
.base {
  width: 148px; height: 36px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 50% 30%,
    #333 0%, #1a1a1a 60%, #0e0e0e 100%);
  box-shadow: 0 6px 18px rgba(0,0,0,0.85);
  margin-top: -10px;
  position: relative;
  z-index: 0;
}

/* Ground shadow */
.ground-shadow {
  width: 148px; height: 20px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.7) 0%, transparent 70%);
  border-radius: 50%;
  margin-top: 2px;
}

/* Rim */
.rim {
  width: 146px; height: 146px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%,
    #4a4a4a 0%, #2a2a2a 55%, #181818 100%);
  box-shadow:
    0 8px 24px rgba(0,0,0,0.9),
    0 3px 8px rgba(0,0,0,0.6);
  position: relative;
  z-index: 1;
  margin-bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Dome container — for layering dome + text */
.dome-wrap {
  position: absolute;
  width: 132px; height: 132px;
  border-radius: 50%;
  transform: translateY(-4px);
}

.dome {
  width: 132px; height: 132px;
  border-radius: 50%;
  box-shadow:
    0 6px 18px rgba(0,0,0,0.55),
    inset 0 -6px 16px rgba(0,0,0,0.35),
    inset 0 2px 5px rgba(255,255,255,0.1);
  position: relative;
}

.dome.red   { background: radial-gradient(circle at 36% 28%, #ff8888 0%, #f03030 18%, #e02020 35%, #c01818 58%, #8b0000 100%); }
.dome.blue  { background: radial-gradient(circle at 36% 28%, #88bbff 0%, #3b82f6 18%, #2563eb 35%, #1d4ed8 58%, #1e3a8a 100%); }
.dome.green { background: radial-gradient(circle at 36% 28%, #88ffb0 0%, #22c55e 18%, #16a34a 35%, #15803d 58%, #14532d 100%); }
.dome.orange{ background: radial-gradient(circle at 36% 28%, #ffc080 0%, #f97316 18%, #ea6c0a 35%, #c2570a 58%, #7c3200 100%); }

.gloss {
  position: absolute;
  top: 6%; left: 12%;
  width: 62%; height: 38%;
  background: radial-gradient(ellipse at 46% 22%,
    rgba(255,255,255,0.46) 0%,
    rgba(255,255,255,0.15) 42%,
    rgba(255,255,255,0) 68%
  );
  border-radius: 50%;
}
.specular {
  position: absolute;
  top: 9%; left: 20%;
  width: 26%; height: 15%;
  background: radial-gradient(ellipse,
    rgba(255,255,255,0.72) 0%,
    rgba(255,255,255,0.22) 50%,
    transparent 75%
  );
  border-radius: 50%;
}
.dome-bottom {
  position: absolute;
  bottom: 5%; left: 8%;
  width: 84%; height: 30%;
  background: radial-gradient(ellipse, rgba(0,0,0,0.25) 0%, transparent 70%);
  border-radius: 50%;
}

/* Label text on dome */
.dome-label {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 12px; /* shift below the glare */
}
.dome-label span {
  font-family: 'Arial Black', Impact, sans-serif;
  font-size: 17px;
  font-weight: 900;
  color: rgba(255,255,255,0.9);
  letter-spacing: 1px;
  text-align: center;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.4);
  line-height: 1.2;
  max-width: 100px;
  overflow-wrap: break-word;
  word-break: normal;
  hyphens: none;
}
</style>
</head>
<body>
  <div class="grid">

    <div class="btn-wrap">
      <div class="rim">
        <div class="dome-wrap">
          <div class="dome red">
            <div class="gloss"></div>
            <div class="specular"></div>
            <div class="dome-bottom"></div>
          </div>
          <div class="dome-label"><span>VR<br>Workout</span></div>
        </div>
      </div>
      <div class="base"></div>
      <div class="ground-shadow"></div>
    </div>

    <div class="btn-wrap">
      <div class="rim">
        <div class="dome-wrap">
          <div class="dome blue">
            <div class="gloss"></div>
            <div class="specular"></div>
            <div class="dome-bottom"></div>
          </div>
          <div class="dome-label"><span>Leg Day</span></div>
        </div>
      </div>
      <div class="base"></div>
      <div class="ground-shadow"></div>
    </div>

    <div class="btn-wrap">
      <div class="rim">
        <div class="dome-wrap">
          <div class="dome green">
            <div class="gloss"></div>
            <div class="specular"></div>
            <div class="dome-bottom"></div>
          </div>
          <div class="dome-label"><span>Healthy<br>Meal</span></div>
        </div>
      </div>
      <div class="base"></div>
      <div class="ground-shadow"></div>
    </div>

    <div class="btn-wrap">
      <div class="rim">
        <div class="dome-wrap">
          <div class="dome orange">
            <div class="gloss"></div>
            <div class="specular"></div>
            <div class="dome-bottom"></div>
          </div>
          <div class="dome-label"><span>Fast Food</span></div>
        </div>
      </div>
      <div class="base"></div>
      <div class="ground-shadow"></div>
    </div>

  </div>
</body>
</html>
